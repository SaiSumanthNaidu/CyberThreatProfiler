{% extends 'base.html' %}

{% block content %}

<h1>Delete Threat</h1>

<div class="alert alert-danger">

    Are you sure you want to delete:

    <strong>
        {{ threat.threat_name }}
    </strong>

</div>

<form method="POST">

    {% csrf_token %}

    <button
        type="submit"
        class="btn btn-danger"
    >
        Confirm Delete
    </button>

    <a
        href="/threats/"
        class="btn btn-secondary"
    >
        Cancel
    </a>

</form>

{% endblock %}
