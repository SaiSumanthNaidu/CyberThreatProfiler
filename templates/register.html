{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Create Account
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{

            margin:0;

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:
            linear-gradient(
                135deg,
                #020617,
                #0f172a,
                #1e293b
            );

            font-family:Arial,sans-serif;
        }

        .register-card{

            width:500px;

            background:rgba(
                30,
                41,
                59,
                0.95
            );

            border:1px solid #334155;

            border-radius:25px;

            padding:40px;

            box-shadow:
            0 0 40px rgba(
                59,
                130,
                246,
                0.30
            );

            text-align:center;

            transition:0.4s;
        }

        .register-card:hover{

            transform:translateY(-5px);
        }

        .logo{

            font-size:50px;

            margin-bottom:10px;
        }

        .title{

            font-size:34px;

            font-weight:700;

            color:white;
        }

        .subtitle{

            color:#94a3b8;

            margin-bottom:30px;
        }

        .form-control{

            background:#0f172a;

            border:1px solid #334155;

            color:white;

            height:50px;

            border-radius:12px;
        }

        .form-control:focus{

            background:#0f172a;

            color:white;

            border-color:#3b82f6;

            box-shadow:
            0 0 15px rgba(
                59,
                130,
                246,
                0.35
            );
        }

        .btn-register{

            width:100%;

            height:50px;

            border:none;

            border-radius:12px;

            background:
            linear-gradient(
                135deg,
                #2563eb,
                #3b82f6
            );

            color:white;

            font-weight:bold;

            transition:0.3s;
        }

        .btn-register:hover{

            transform:translateY(-3px);

            box-shadow:
            0 0 20px rgba(
                59,
                130,
                246,
                0.5
            );
        }

        .login-link{

            color:#60a5fa;

            text-decoration:none;
        }

        .login-link:hover{

            color:white;
        }

    </style>

</head>

<body>

    <div class="register-card">

        <div class="logo">
            🛡️
        </div>

        <div class="title">
            Create Account
        </div>

        <div class="subtitle">
            Join Cyber Threat Profiler
        </div>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Username"
                    required>

            </div>

            <div class="mb-3">

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Email Address"
                    required>

            </div>

            <div class="mb-4">

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Password"
                    required>

            </div>

            <button
                type="submit"
                class="btn-register">

                Create Account

            </button>

        </form>

        <div class="mt-4">

            <a href="/"
               class="login-link">

                Already have an account? Login

            </a>

        </div>

        <div style="margin-top:25px;color:#64748b;font-size:12px;">

            Cyber Threat Profiler v1.0

        </div>

    </div>

{% if error %}
<div style="color:red;">
    {{ error }}
</div>
{% endif %}

</body>

</html>
