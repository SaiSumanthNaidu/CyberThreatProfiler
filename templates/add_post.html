{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4">
    Add Post
</h1>

<form method="POST">

    {% csrf_token %}

    <div class="mb-3">
        <input
            type="text"
            name="source"
            class="form-control"
            placeholder="Source"
            required
        >
    </div>

    <div class="mb-3">
        <input
            type="text"
            name="author"
            class="form-control"
            placeholder="Author"
            required
        >
    </div>

    <div class="mb-3">
        <textarea
            name="content"
            class="form-control"
            placeholder="Content"
            rows="5"
            required
        ></textarea>
    </div>

    <div class="mb-3">
        <input
            type="number"
            name="threat_score"
            class="form-control"
            placeholder="Threat Score"
            required
        >
    </div>

    <button
        type="submit"
        class="btn btn-primary"
    >
        Save Post
    </button>

</form>

{% endblock %}
