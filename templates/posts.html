{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4">
    Posts Management
</h1>
<a href="/posts/add/"
   class="btn btn-primary mb-3">
   Add Post
</a>
<table class="table table-dark">

    <thead>

        <tr>
            <th>Source</th>
            <th>Author</th>
            <th>Threat Score</th>
            <th>Date</th>
            <th>Actions</th>
        </tr>

    </thead>

    <tbody>

        {% for post in posts %}

        <tr>

            <td>{{ post.source }}</td>

            <td>{{ post.author }}</td>

            <td>{{ post.threat_score }}</td>

            <td>{{ post.created_at }}</td>

<td>

    <a href="/posts/edit/{{ post.id }}/"
       class="btn btn-warning btn-sm">
       Edit
    </a>

    <a href="/posts/delete/{{ post.id }}/"
       class="btn btn-danger btn-sm">
       Delete
    </a>

</td>

        </tr>

        {% empty %}

        <tr>

            <td colspan="4">
                No posts found.
            </td>

        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
