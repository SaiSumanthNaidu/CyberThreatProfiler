{% extends 'base.html' %}

{% block content %}

<h1>Add Alert</h1>

<form method="POST">

    {% csrf_token %}

    <div class="mb-3">

        <label>Title</label>

        <input
            type="text"
            name="title"
            class="form-control"
            required
        >

    </div>

    <div class="mb-3">

        <label>Risk Level</label>

        <select
            name="risk_level"
            class="form-control"
        >
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
        </select>

    </div>

    <div class="mb-3">

        <label>Description</label>

        <textarea
            name="description"
            class="form-control"
            rows="4"
            required
        ></textarea>

    </div>

    <button
        type="submit"
        class="btn btn-success"
    >
        Save Alert
    </button>

    <a
        href="/alerts/"
        class="btn btn-secondary"
    >
        Cancel
    </a>

</form>

{% endblock %}
